<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>賈許 🐱</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans&family=Noto+Sans+JP&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--cream:#fdf6ee;
--warm:#f2e4cf;
--brown:#7a4f2e;
--dark:#2b1a0f;
--accent:#c8622a;
}

/* 背景 */
body{
background:var(--cream);
font-family:'DM Sans','Noto Sans JP';
display:flex;
flex-direction:column;
align-items:center;
}

/* 語言 */
.lang-bar{
position:fixed;
top:14px;
right:14px;
display:flex;
gap:6px;
z-index:100;
}

.lang-btn{
padding:6px 12px;
border-radius:99px;
border:none;
background:#00000060;
color:#fff;
cursor:pointer;
}

.lang-btn.active{
background:#fff;
color:var(--accent);
}

/* HERO */
.hero{
width:100%;
text-align:center;
padding:60px 20px 90px;
background:linear-gradient(160deg,#3a2010,#7a4f2e,#c8622a);
color:#fff;
position:relative;
overflow:hidden;
}

.hero::after{
content:"🐾";
position:absolute;
font-size:120px;
opacity:0.05;
right:-10px;
top:-20px;
}

.avatar-ring{
width:120px;
height:120px;
border-radius:50%;
overflow:hidden;
margin:auto;
border:4px solid rgba(255,255,255,0.4);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
animation:pop 0.5s ease;
}

.avatar-ring img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes pop{
from{transform:scale(0.7);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.hero h1{
font-family:'Playfair Display';
font-size:2.4rem;
margin-top:10px;
}

/* 卡片區 */
.card-wrap{
max-width:420px;
width:100%;
margin-top:-50px;
padding:0 16px;
display:flex;
flex-direction:column;
gap:12px;
}

/* 卡片 */
.card{
background:#fff;
padding:20px;
border-radius:18px;
box-shadow:0 4px 16px rgba(0,0,0,0.08);
}

/* 警告 */
.warning{
background:#fff3e0;
color:#e65100;
font-weight:bold;
border:1px solid #ffcc80;
}

/* 按鈕 */
.btn{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
padding:16px;
border-radius:14px;
text-decoration:none;
font-weight:500;
}

.btn-primary{
background:var(--accent);
color:#fff;
}

.btn-dark{
background:var(--dark);
color:#fff;
}

.btn-outline{
border:2px solid #ddd;
color:#333;
background:#fff;
}

/* GPS卡 */
.gps-card{
background:linear-gradient(135deg,#2b1a0f,#7a4f2e);
color:#fff;
padding:20px;
border-radius:18px;
}

/* 小動畫 */
.fade{
animation:fade 0.3s;
}

@keyframes fade{
from{opacity:0;transform:translateY(6px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<!-- 語言 -->
<div class="lang-bar">
<button class="lang-btn active" onclick="setLang('zh',this)">中</button>
<button class="lang-btn" onclick="setLang('en',this)">EN</button>
<button class="lang-btn" onclick="setLang('ja',this)">日</button>
</div>

<!-- HERO -->
<div class="hero">
<div class="avatar-ring">
<img src="https://raw.githubusercontent.com/godivanlife-creator/liu_josh_0428/main/IMG_0477.jpg">
</div>
<h1>賈許</h1>
</div>

<div class="card-wrap" id="wrap">

<div class="card warning" id="t-warning"></div>

<div class="card">
<strong id="t-feature-title"></strong>
<p id="t-feature"></p>
</div>

<div class="card">
<strong id="t-personality-title"></strong>
<p id="t-personality"></p>
</div>

<a class="btn btn-primary" href="tel:0909030831" id="t-call1"></a>
<a class="btn btn-dark" href="tel:0922772161" id="t-call2"></a>

<div class="gps-card">
<p id="t-gps-desc"></p>
<button class="btn btn-outline" id="gps-btn" onclick="sendGPS()"></button>
</div>

<a class="btn btn-outline" href="https://www.instagram.com/liu_josh_0428" target="_blank" id="t-ig"></a>

</div>

<script>

const i18n={
zh:{
warning:"⚠️ 請勿驚嚇或強抱牠",
featureTitle:"🐾 品種",
feature:"美短 × 曼赤肯",
personalityTitle:"🐾 個性",
personality:"溫和 · 愛撒嬌",
call1:"📞 聯絡主人 1",
call2:"📞 聯絡主人 2",
gpsDesc:"點擊下方按鈕傳送位置給飼主",
gpsBtn:"📍 回報位置",
gpsLoading:"定位中...",
gpsError:"定位失敗",
ig:"📸 IG 看日常"
},
en:{
warning:"⚠️ Please do not scare or grab suddenly",
featureTitle:"🐾 Breed",
feature:"American Shorthair × Munchkin",
personalityTitle:"🐾 Personality",
personality:"Gentle · Affectionate",
call1:"📞 Call Owner 1",
call2:"📞 Call Owner 2",
gpsDesc:"Send your location to the owner",
gpsBtn:"📍 Send Location",
gpsLoading:"Getting...",
gpsError:"Failed",
ig:"📸 Instagram"
},
ja:{
warning:"⚠️ 急に触らないでください",
featureTitle:"🐾 種類",
feature:"アメショー × マンチカン",
personalityTitle:"🐾 性格",
personality:"優しい · 甘えん坊",
call1:"📞 飼い主1",
call2:"📞 飼い主2",
gpsDesc:"位置情報を送信",
gpsBtn:"📍 送信",
gpsLoading:"取得中",
gpsError:"失敗",
ig:"📸 インスタ"
}
};

let currentLang='zh';

function applyLang(){
const t=i18n[currentLang];
document.getElementById("t-warning").innerText=t.warning;
document.getElementById("t-feature-title").innerText=t.featureTitle;
document.getElementById("t-feature").innerText=t.feature;
document.getElementById("t-personality-title").innerText=t.personalityTitle;
document.getElementById("t-personality").innerText=t.personality;
document.getElementById("t-call1").innerText=t.call1;
document.getElementById("t-call2").innerText=t.call2;
document.getElementById("t-gps-desc").innerText=t.gpsDesc;
document.getElementById("gps-btn").innerText=t.gpsBtn;
document.getElementById("t-ig").innerText=t.ig;
}

function setLang(lang,el){
currentLang=lang;
applyLang();
document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
el.classList.add('active');
document.getElementById("wrap").classList.add("fade");
setTimeout(()=>wrap.classList.remove("fade"),300);
}

applyLang();

/* GPS */
function sendGPS(){
const btn=document.getElementById("gps-btn");
const t=i18n[currentLang];

btn.innerText=t.gpsLoading;
btn.disabled=true;

navigator.geolocation.getCurrentPosition(pos=>{
const lat=pos.coords.latitude.toFixed(6);
const lng=pos.coords.longitude.toFixed(6);
const url=`https://maps.google.com/?q=${lat},${lng}`;
const msg=encodeURIComponent("🐾 發現賈許："+url);

window.location.href=`sms:0909030831?body=${msg}`;
resetGPS();

},()=>{
alert(t.gpsError);
resetGPS();
});
}

function resetGPS(){
const btn=document.getElementById("gps-btn");
btn.disabled=false;
btn.innerText=i18n[currentLang].gpsBtn;
}

</script>

</body>
</html>
