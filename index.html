<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>賈許 🐱</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans&family=Noto+Sans+JP&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--cream:#fdf6ee;
--brown:#7a4f2e;
--dark:#2b1a0f;
--accent:#c8622a;
}

body{
background:var(--cream);
font-family:'DM Sans','Noto Sans JP';
display:flex;
flex-direction:column;
align-items:center;
}

/* HERO */
.hero{
width:100%;
text-align:center;
padding:60px 20px 80px;
background:linear-gradient(160deg,#3a2010,#7a4f2e,#c8622a);
color:#fff;
}

.avatar-ring{
width:110px;
height:110px;
border-radius:50%;
overflow:hidden;
margin:auto;
border:4px solid rgba(255,255,255,0.4);
}

.avatar-ring img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

.hero h1{
font-size:2rem;
}

/* 卡片 */
.card-wrap{
max-width:420px;
width:100%;
margin-top:-40px;
padding:0 16px;
}

.card{
background:#fff;
padding:20px;
border-radius:16px;
margin-bottom:12px;
}

/* 按鈕 */
.btn{
display:block;
padding:16px;
border-radius:14px;
text-align:center;
margin-top:10px;
text-decoration:none;
}

.btn-primary{background:var(--accent);color:#fff;}
.btn-dark{background:var(--dark);color:#fff;}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<div class="avatar-ring">
<img src="https://raw.githubusercontent.com/godivanlife-creator/liu_josh_0428/main/IMG_0477.jpg" alt="賈許">
</div>
<h1>賈許</h1>
</div>

<div class="card-wrap">

<div class="card">
🐾 溫和 · 愛撒嬌
</div>

<a class="btn" href="https://www.instagram.com/liu_josh_0428" target="_blank">

</div>

</body>
</html>
